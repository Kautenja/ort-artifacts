name: CD
on:
  workflow_dispatch:
    inputs:
      onnxruntime-ref:
        type: string
        description: "ONNX Runtime repository reference, e.g., 'v1.22.2' or 'main'"
        default: "v1.22.2"
      linux-aarch64-static:
        type: boolean
        description: "Linux aarch64 static"
        required: false
        default: true
      linux-x86_64-static:
        type: boolean
        description: "Linux x86_64 static"
        required: false
        default: true
      macos-aarch64-static:
        type: boolean
        description: "macOS aarch64 static"
        required: false
        default: true
      macos-x86_64-static:
        type: boolean
        description: "macOS x86_64 static"
        required: false
        default: true
      macos-universal-static:
        type: boolean
        description: "macOS universal static, derived from aarch64 and x86_64"
        required: false
        default: true
      windows-md-x86_64-static:
        type: boolean
        description: "Windows x86_64 static, dynamic CRT"
        required: false
        default: true
      ios-aarch64-static:
        type: boolean
        description: "iOS device aarch64 static"
        required: false
        default: true
      ios-simulator-aarch64-static:
        type: boolean
        description: "iOS simulator aarch64 static"
        required: false
        default: true
      ios-simulator-x86_64-static:
        type: boolean
        description: "iOS simulator x86_64 static"
        required: false
        default: true
      ios-simulator-universal-static:
        type: boolean
        description: "iOS simulator universal static, derived from aarch64 and x86_64"
        required: false
        default: true
      apple-xcframework:
        type: boolean
        description: "Apple XCFramework, derived from iOS device, simulator universal, and macOS universal"
        required: false
        default: true
      android-arm64-v8a-static:
        type: boolean
        description: "Android arm64-v8a static"
        required: false
        default: true
      android-armeabi-v7a-static:
        type: boolean
        description: "Android armeabi-v7a static"
        required: false
        default: true
      android-x86_64-static:
        type: boolean
        description: "Android x86_64 static"
        required: false
        default: true
      android-x86-static:
        type: boolean
        description: "Android x86 static"
        required: false
        default: true
      buildtype:
        type: choice
        required: true
        default: 'Release'
        options:
          - 'Both'
          - 'Release'
          - 'Debug'
      required-operators-config-base64:
        type: string
        description: "Optional base64-encoded contents of a *.required_operators.config or *.required_operators_and_types.config file."
        required: false
        default: ""
      enable-reduced-operator-type-support:
        type: boolean
        description: "Enable ONNX Runtime reduced operator type support. Requires required-operators-config-base64."
        required: false
        default: false
      enable-xnnpack:
        type: boolean
        description: "Enable XNNPACK for compatible targets only."
        required: false
        default: true
      enable-openvino:
        type: boolean
        description: "Enable OpenVINO for compatible targets only."
        required: false
        default: true
      enable-directml:
        type: boolean
        description: "Enable DirectML for compatible targets only."
        required: false
        default: true
      enable-coreml:
        type: boolean
        description: "Enable CoreML for compatible targets only."
        required: false
        default: true
      enable-nnapi:
        type: boolean
        description: "Enable NNAPI for compatible targets only."
        required: false
        default: true
env:
  GCC_VERSION: '11'
  CMAKE_VERSION: '3.28'
  PYTHON_VERSION: '3.10'
  XCODE_VERSION: '14.3.1'

jobs:
  select-targets:
    name: Select build targets
    runs-on: ubuntu-22.04
    outputs:
      targets: ${{ steps.targets.outputs.targets }}
    steps:
      - name: Build exact target list
        id: targets
        shell: bash
        env:
          LINUX_AARCH64_STATIC: ${{ inputs['linux-aarch64-static'] }}
          LINUX_X86_64_STATIC: ${{ inputs['linux-x86_64-static'] }}
          MACOS_AARCH64_STATIC: ${{ inputs['macos-aarch64-static'] }}
          MACOS_X86_64_STATIC: ${{ inputs['macos-x86_64-static'] }}
          MACOS_UNIVERSAL_STATIC: ${{ inputs['macos-universal-static'] }}
          WINDOWS_MD_X86_64_STATIC: ${{ inputs['windows-md-x86_64-static'] }}
          IOS_AARCH64_STATIC: ${{ inputs['ios-aarch64-static'] }}
          IOS_SIMULATOR_AARCH64_STATIC: ${{ inputs['ios-simulator-aarch64-static'] }}
          IOS_SIMULATOR_X86_64_STATIC: ${{ inputs['ios-simulator-x86_64-static'] }}
          IOS_SIMULATOR_UNIVERSAL_STATIC: ${{ inputs['ios-simulator-universal-static'] }}
          APPLE_XCFRAMEWORK: ${{ inputs['apple-xcframework'] }}
          ANDROID_ARM64_V8A_STATIC: ${{ inputs['android-arm64-v8a-static'] }}
          ANDROID_ARMEABI_V7A_STATIC: ${{ inputs['android-armeabi-v7a-static'] }}
          ANDROID_X86_64_STATIC: ${{ inputs['android-x86_64-static'] }}
          ANDROID_X86_STATIC: ${{ inputs['android-x86-static'] }}
        run: |
          targets=()
          [[ "$LINUX_AARCH64_STATIC" == "true" ]] && targets+=(linux-aarch64-static)
          [[ "$LINUX_X86_64_STATIC" == "true" ]] && targets+=(linux-x86_64-static)
          [[ "$MACOS_AARCH64_STATIC" == "true" ]] && targets+=(macos-aarch64-static)
          [[ "$MACOS_X86_64_STATIC" == "true" ]] && targets+=(macos-x86_64-static)
          [[ "$MACOS_UNIVERSAL_STATIC" == "true" ]] && targets+=(macos-universal-static)
          [[ "$WINDOWS_MD_X86_64_STATIC" == "true" ]] && targets+=(windows-md-x86_64-static)
          [[ "$IOS_AARCH64_STATIC" == "true" ]] && targets+=(ios-aarch64-static)
          [[ "$IOS_SIMULATOR_AARCH64_STATIC" == "true" ]] && targets+=(ios-simulator-aarch64-static)
          [[ "$IOS_SIMULATOR_X86_64_STATIC" == "true" ]] && targets+=(ios-simulator-x86_64-static)
          [[ "$IOS_SIMULATOR_UNIVERSAL_STATIC" == "true" ]] && targets+=(ios-simulator-universal-static)
          [[ "$APPLE_XCFRAMEWORK" == "true" ]] && targets+=(apple-xcframework)
          [[ "$ANDROID_ARM64_V8A_STATIC" == "true" ]] && targets+=(android-arm64-v8a-static)
          [[ "$ANDROID_ARMEABI_V7A_STATIC" == "true" ]] && targets+=(android-armeabi-v7a-static)
          [[ "$ANDROID_X86_64_STATIC" == "true" ]] && targets+=(android-x86_64-static)
          [[ "$ANDROID_X86_STATIC" == "true" ]] && targets+=(android-x86-static)

          target_list=$(IFS=,; echo "${targets[*]}")
          echo "targets=${target_list}" >> "$GITHUB_OUTPUT"
          if [[ -n "$target_list" ]]; then
            echo "Selected targets: ${target_list}"
          else
            echo "::notice::No target checkbox was selected; CD will fail before platform setup."
          fi

  validate-targets:
    name: Validate target selection
    needs: select-targets
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}
      targets: ${{ steps.targets.outputs.targets }}
      universal-matrix: ${{ steps.targets.outputs.universal_matrix }}
      universal-targets: ${{ steps.targets.outputs.universal_targets }}
      xcframework-matrix: ${{ steps.targets.outputs.xcframework_matrix }}
      xcframework-targets: ${{ steps.targets.outputs.xcframework_targets }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve exact target matrix
        id: targets
        shell: bash
        env:
          SELECTED_TARGETS: ${{ needs.select-targets.outputs.targets }}
          BUILD_TYPES: ${{ inputs.buildtype }}
          ENABLE_XNNPACK: ${{ inputs.enable-xnnpack }}
          ENABLE_OPENVINO: ${{ inputs.enable-openvino }}
          ENABLE_DIRECTML: ${{ inputs.enable-directml }}
          ENABLE_COREML: ${{ inputs.enable-coreml }}
          ENABLE_NNAPI: ${{ inputs.enable-nnapi }}
        run: |
          python3 .github/scripts/resolve_build_targets.py --github-output "$GITHUB_OUTPUT"

  build:
    name: Build ort-${{ inputs.onnxruntime-ref }}-${{ matrix.target }}-${{ matrix.buildtype }}
    needs: validate-targets
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.validate-targets.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate reduced operator input combination
        if: >
          inputs.enable-reduced-operator-type-support &&
          inputs.required-operators-config-base64 == ''
        shell: bash
        run: |
          echo "enable-reduced-operator-type-support requires required-operators-config-base64." >&2
          exit 1

      - name: Decode and validate required operators config
        id: required-ops
        if: inputs.required-operators-config-base64 != ''
        env:
          REQUIRED_OPERATORS_CONFIG_BASE64: ${{ inputs.required-operators-config-base64 }}
        shell: bash
        run: |
          PYTHON=python3
          if ! command -v "$PYTHON" >/dev/null 2>&1; then
            PYTHON=python
          fi
          CONFIG_PATH="$RUNNER_TEMP/required_operators.config"
          if command -v cygpath >/dev/null 2>&1; then
            CONFIG_PATH="$(cygpath -u "$RUNNER_TEMP")/required_operators.config"
          fi

          VALIDATION_ARGS=()
          if [[ "${{ inputs.enable-reduced-operator-type-support }}" == "true" ]]; then
            VALIDATION_ARGS+=(--enable-reduced-operator-type-support)
          fi

          "$PYTHON" .github/scripts/validate_required_operators_config.py \
            --base64-env REQUIRED_OPERATORS_CONFIG_BASE64 \
            --output "$CONFIG_PATH" \
            --github-output "$GITHUB_OUTPUT" \
            "${VALIDATION_ARGS[@]}"
          echo "path=${CONFIG_PATH}" >> "$GITHUB_OUTPUT"

      - name: Free Disk Space (Ubuntu)
        if: contains(matrix.runs-on, 'ubuntu')
        uses: ChrisCarini/free-disk-space@main
        with:
          tool-cache: false
          android: ${{ !contains(matrix.target, 'android') }}
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true

      - name: Install cross-compilation tools
        if: matrix.target == 'linux-aarch64-static'
        run: |
          # Install basic build tools
          sudo apt update && sudo apt install -y make ninja-build wget xz-utils

          # Download and install ARM GNU Toolchain with GCC 11.3
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/11.3.rel1/binrel/arm-gnu-toolchain-11.3.rel1-x86_64-aarch64-none-linux-gnu.tar.xz
          sudo mkdir -p /opt/linaro-toolchain
          sudo tar -xf arm-gnu-toolchain-11.3.rel1-x86_64-aarch64-none-linux-gnu.tar.xz -C /opt/linaro-toolchain --strip-components=1
          rm arm-gnu-toolchain-11.3.rel1-x86_64-aarch64-none-linux-gnu.tar.xz

          # Add toolchain to PATH and create symlinks for compatibility
          echo "/opt/linaro-toolchain/bin" >> $GITHUB_PATH
          sudo ln -sf /opt/linaro-toolchain/bin/aarch64-none-linux-gnu-gcc /usr/bin/aarch64-none-linux-gnu-gcc
          sudo ln -sf /opt/linaro-toolchain/bin/aarch64-none-linux-gnu-g++ /usr/bin/aarch64-none-linux-gnu-g++

      - uses: actions/setup-java@v4
        if: contains(matrix.target, 'android')
        with:
          java-version: "17"
          distribution: "temurin"

      - uses: android-actions/setup-android@v3
        if: contains(matrix.target, 'android')

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        if: contains(matrix.target, 'android')
        with:
          add-to-path: false
          ndk-version: r28

      - name: Verify Android SDK and NDK
        if: contains(matrix.target, 'android')
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        shell: bash
        run: |
          test -n "${ANDROID_SDK_ROOT:-}"
          test -d "${ANDROID_SDK_ROOT}"
          test -n "${ANDROID_NDK_HOME:-}"
          test -d "${ANDROID_NDK_HOME}"

      - uses: JW-AV/install-openvino-action@v10.1
        if: contains(matrix.args, '--openvino')
        with:
          version: "2025.2"
          arch: ${{ contains(matrix.target, 'aarch64') && 'arm64' || 'x86_64' }}
          release: ${{ (contains(matrix.target, 'linux') && (contains(matrix.target, 'aarch64') && 'ubuntu20' || 'ubuntu22') || 'ubuntu22') || '' }}

      - name: Verify OpenVINO CMake package
        if: contains(matrix.args, '--openvino')
        shell: bash
        run: |
          OPENVINO_ROOT="${INTEL_OPENVINO_DIR:-${OPENVINO_INSTALL_DIR:-}}"
          if [[ -z "${OpenVINO_DIR:-}" && -n "$OPENVINO_ROOT" ]]; then
            OpenVINO_DIR="$OPENVINO_ROOT/runtime/cmake"
            echo "OpenVINO_DIR=$OpenVINO_DIR" >> "$GITHUB_ENV"
          fi

          if [[ -z "${TBB_DIR:-}" && -n "$OPENVINO_ROOT" ]]; then
            for candidate in \
              "$OPENVINO_ROOT/runtime/3rdparty/tbb/lib/cmake/TBB" \
              "$OPENVINO_ROOT/runtime/3rdparty/tbb/lib/cmake/tbb" \
              "$OPENVINO_ROOT/runtime/3rdparty/tbb/lib64/cmake/TBB" \
              "$OPENVINO_ROOT/runtime/3rdparty/tbb/cmake"; do
              if [[ -f "$candidate/TBBConfig.cmake" || -f "$candidate/tbb-config.cmake" ]]; then
                TBB_DIR="$candidate"
                echo "TBB_DIR=$TBB_DIR" >> "$GITHUB_ENV"
                break
              fi
            done
          fi

          echo "OPENVINO_INSTALL_DIR=${OPENVINO_INSTALL_DIR:-}"
          echo "INTEL_OPENVINO_DIR=${INTEL_OPENVINO_DIR:-}"
          echo "OpenVINO_DIR=${OpenVINO_DIR:-}"
          echo "TBB_DIR=${TBB_DIR:-}"

          test -n "${OpenVINO_DIR:-}"
          if [[ ! -f "$OpenVINO_DIR/OpenVINOConfig.cmake" && ! -f "$OpenVINO_DIR/openvino-config.cmake" ]]; then
            echo "OpenVINO CMake config was not found under OpenVINO_DIR=$OpenVINO_DIR" >&2
            exit 1
          fi

      - name: Ubuntu GCC 11 setup
        if: contains(matrix.runs-on, 'ubuntu-24')
        shell: bash
        run: |
          sudo apt install gcc-11 g++-11
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-11 70 --slave /usr/bin/g++ g++ /usr/bin/g++-11 --slave /usr/bin/gcov gcov /usr/bin/gcov-11

      - name: Install clang
        if: contains(matrix.target, 'linux')
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Verify Windows build tools
        if: contains(matrix.target, 'windows')
        shell: bash
        run: |
          command -v cmake
          command -v ninja
          command -v 7z

          PROGFILES_X86=$(printenv "ProgramFiles(x86)" 2>/dev/null || true)
          if [[ -n "$PROGFILES_X86" ]]; then
            PROGFILES_X86=$(cygpath -u "$PROGFILES_X86")
          else
            PROGFILES_X86="/c/Program Files (x86)"
          fi

          VSWHERE_PATH="$PROGFILES_X86/Microsoft Visual Studio/Installer/vswhere.exe"
          "$VSWHERE_PATH" -latest -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath

      - name: Install reduced-ops Python dependency
        if: inputs.required-operators-config-base64 != ''
        shell: bash
        run: |
          PYTHON=python3
          if ! command -v "$PYTHON" >/dev/null 2>&1; then
            PYTHON=python
          fi
          "$PYTHON" -m pip install --user flatbuffers
          PYTHON_PATH=$(command -v "$PYTHON")
          if command -v cygpath >/dev/null 2>&1; then
            PYTHON_PATH=$(cygpath -m "$PYTHON_PATH")
          fi
          echo "PYTHON3_EXECUTABLE=${PYTHON_PATH}" >> "$GITHUB_ENV"

      - name: Run build
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          CMAKE_SYSROOT: ${{ (matrix.target == 'linux-aarch64-dylib' || matrix.target == 'linux-aarch64-static') && '/opt/linaro-toolchain/aarch64-none-linux-gnu/libc' || '' }}
          CMAKE_FIND_ROOT_PATH: ${{ (matrix.target == 'linux-aarch64-dylib' || matrix.target == 'linux-aarch64-static') && '/opt/linaro-toolchain/aarch64-none-linux-gnu' || '' }}
          TARGET_LINUX: ${{ contains(matrix.target, 'linux') && 'true' || 'false' }}
          REQUIRED_OPERATORS_CONFIG_PATH: ${{ steps.required-ops.outputs.path }}
        shell: bash
        run: |
          REQUIRED_OPS_ARGS=()
          if [[ -n "${REQUIRED_OPERATORS_CONFIG_PATH:-}" ]]; then
            REQUIRED_OPS_ARGS+=(--required-operators-config "$REQUIRED_OPERATORS_CONFIG_PATH")
            if [[ "${{ inputs.enable-reduced-operator-type-support }}" == "true" ]]; then
              REQUIRED_OPS_ARGS+=(--enable-reduced-operator-type-support)
            fi
          fi

          ./build.sh -r "${{ inputs.onnxruntime-ref }}" -b "${{ matrix.buildtype }}" ${{ matrix.args }} "${REQUIRED_OPS_ARGS[@]}"

      # See: https://github.com/microsoft/onnxruntime/issues/24911
      # - name: Remove executable stack flag
      #   if: matrix.target == 'linux-x86_64-dylib' || matrix.target == 'linux-aarch64-dylib' || matrix.target == 'android-aarch64-dylib'
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y patchelf
      #     # patchelf --clear-execstack build/artifact/onnxruntime/lib/libonnxruntime_sx${{ (matrix.buildtype == 'Debug') && 'd' || '' }}.so
      #     execstack -c build/artifact/onnxruntime/lib/libonnxruntime_sx${{ (matrix.buildtype == 'Debug') && 'd' || '' }}.so

      - name: Fix OpenVINO linux rpath
        # NOTE: The version in the file path below must match the version for the `install-openvino-action` above
        if: >
          contains(matrix.args, '--openvino') && contains(matrix.target, 'linux')
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf
          patchelf --set-rpath '$ORIGIN' build/artifact/onnxruntime/lib/libopenvino.so.2025.2.0

      - name: Lowercase buildtype
        id: lower-buildtype
        shell: bash
        run: |
          LOWER=$(echo "${{ matrix.buildtype }}" | tr '[:upper:]' '[:lower:]')
          echo "string=${LOWER}" >> $GITHUB_OUTPUT

      - name: Write reduced-ops artifact metadata
        if: inputs.required-operators-config-base64 != ''
        env:
          REQUIRED_OPERATORS_CONFIG_PATH: ${{ steps.required-ops.outputs.path }}
        shell: bash
        run: |
          PYTHON=python3
          if ! command -v "$PYTHON" >/dev/null 2>&1; then
            PYTHON=python
          fi

          METADATA_ARGS=()
          if [[ "${{ inputs.enable-reduced-operator-type-support }}" == "true" ]]; then
            METADATA_ARGS+=(--enable-reduced-operator-type-support)
          fi

          "$PYTHON" .github/scripts/validate_required_operators_config.py \
            "$REQUIRED_OPERATORS_CONFIG_PATH" \
            --metadata-output build/artifact/onnxruntime/reduced_operators.json \
            "${METADATA_ARGS[@]}"

      - name: Validate and slim Windows artifact staging
        if: contains(matrix.target, 'windows')
        shell: bash
        run: |
          PYTHON=python3
          if ! command -v "$PYTHON" >/dev/null 2>&1; then
            PYTHON=python
          fi

          SLIM_ARGS=(--artifact-root build/artifact --buildtype "${{ matrix.buildtype }}")
          if [[ "${{ matrix.args }}" == *"--directml"* ]]; then
            SLIM_ARGS+=(--expect-directml)
          fi

          "$PYTHON" .github/scripts/slim_windows_artifact.py "${SLIM_ARGS[@]}"

      - name: Validate public header layout
        shell: bash
        env:
          BUILD_TARGET: ${{ matrix.target }}
          BUILD_ARGS: ${{ matrix.args }}
        run: |
          PYTHON=python3
          if ! command -v "$PYTHON" >/dev/null 2>&1; then
            PYTHON=python
          fi

          "$PYTHON" .github/scripts/validate_public_headers.py \
            --artifact-root build/artifact \
            --target "$BUILD_TARGET" \
            --build-args "$BUILD_ARGS"

      - name: Artifact name
        id: artifact-name
        shell: bash
        env:
          REQUIRED_OPERATORS_CONFIG_SHA_SHORT: ${{ steps.required-ops.outputs.sha256_short }}
        run: |
          ARTIFACT_NAME="ort-${{ inputs.onnxruntime-ref }}-${{ matrix.target }}-${{ steps.lower-buildtype.outputs.string }}"
          if [[ -n "${REQUIRED_OPERATORS_CONFIG_SHA_SHORT:-}" ]]; then
            ARTIFACT_NAME="ort-${{ inputs.onnxruntime-ref }}-${{ matrix.target }}-ops-${REQUIRED_OPERATORS_CONFIG_SHA_SHORT}-${{ steps.lower-buildtype.outputs.string }}"
          fi
          echo "name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

      # Create archive based on target OS
      - name: Create artifact (.zip or .tar.gz)
        run: |
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            pushd build/artifact
            7z a -tzip "$(dirs +1 -l)/${{ steps.artifact-name.outputs.name }}.zip" .
            popd
          else
            pushd build/artifact
            zip -y -r "$(dirs +1 -l)/${{ steps.artifact-name.outputs.name }}.zip" .
            popd
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: '${{ steps.artifact-name.outputs.name }}.zip'
          if-no-files-found: error

  package-universal-apple:
    name: Package ort-${{ inputs.onnxruntime-ref }}-${{ matrix.target }}-${{ matrix.buildtype }}
    if: needs.validate-targets.outputs['universal-targets'] != ''
    needs: [validate-targets, build]
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.validate-targets.outputs['universal-matrix']) }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate reduced operator input combination
        if: >
          inputs.enable-reduced-operator-type-support &&
          inputs.required-operators-config-base64 == ''
        shell: bash
        run: |
          echo "enable-reduced-operator-type-support requires required-operators-config-base64." >&2
          exit 1

      - name: Decode and validate required operators config for artifact names
        id: required-ops
        if: inputs.required-operators-config-base64 != ''
        env:
          REQUIRED_OPERATORS_CONFIG_BASE64: ${{ inputs.required-operators-config-base64 }}
        shell: bash
        run: |
          CONFIG_PATH="$RUNNER_TEMP/required_operators.config"
          VALIDATION_ARGS=()
          if [[ "${{ inputs.enable-reduced-operator-type-support }}" == "true" ]]; then
            VALIDATION_ARGS+=(--enable-reduced-operator-type-support)
          fi

          python3 .github/scripts/validate_required_operators_config.py \
            --base64-env REQUIRED_OPERATORS_CONFIG_BASE64 \
            --output "$CONFIG_PATH" \
            --github-output "$GITHUB_OUTPUT" \
            "${VALIDATION_ARGS[@]}"

      - name: Lowercase buildtype
        id: lower-buildtype
        shell: bash
        run: |
          LOWER=$(echo "${{ matrix.buildtype }}" | tr '[:upper:]' '[:lower:]')
          echo "string=${LOWER}" >> "$GITHUB_OUTPUT"

      - name: Artifact names
        id: artifact-names
        shell: bash
        env:
          REQUIRED_OPERATORS_CONFIG_SHA_SHORT: ${{ steps.required-ops.outputs.sha256_short }}
        run: |
          artifact_name() {
            local target="$1"
            if [[ -n "${REQUIRED_OPERATORS_CONFIG_SHA_SHORT:-}" ]]; then
              echo "ort-${{ inputs.onnxruntime-ref }}-${target}-ops-${REQUIRED_OPERATORS_CONFIG_SHA_SHORT}-${{ steps.lower-buildtype.outputs.string }}"
            else
              echo "ort-${{ inputs.onnxruntime-ref }}-${target}-${{ steps.lower-buildtype.outputs.string }}"
            fi
          }

          AARCH64_ARTIFACT=$(artifact_name "${{ matrix.source_aarch64_target }}")
          X86_64_ARTIFACT=$(artifact_name "${{ matrix.source_x86_64_target }}")
          UNIVERSAL_ARTIFACT=$(artifact_name "${{ matrix.target }}")

          echo "aarch64=${AARCH64_ARTIFACT}" >> "$GITHUB_OUTPUT"
          echo "x86_64=${X86_64_ARTIFACT}" >> "$GITHUB_OUTPUT"
          echo "universal=${UNIVERSAL_ARTIFACT}" >> "$GITHUB_OUTPUT"
          echo "Universal source artifacts: ${AARCH64_ARTIFACT}, ${X86_64_ARTIFACT}"
          echo "Universal output artifact: ${UNIVERSAL_ARTIFACT}"

      - name: Download aarch64 source artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ steps.artifact-names.outputs.aarch64 }}
          path: universal-sources/aarch64

      - name: Download x86_64 source artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ steps.artifact-names.outputs.x86_64 }}
          path: universal-sources/x86_64

      - name: Create universal static artifact
        shell: bash
        run: |
          AARCH64_ARCHIVE="universal-sources/aarch64/${{ steps.artifact-names.outputs.aarch64 }}.zip"
          X86_64_ARCHIVE="universal-sources/x86_64/${{ steps.artifact-names.outputs.x86_64 }}.zip"

          if [[ ! -f "$AARCH64_ARCHIVE" ]]; then
            echo "::error::Required aarch64 source artifact archive was not downloaded: $AARCH64_ARCHIVE"
            exit 1
          fi
          if [[ ! -f "$X86_64_ARCHIVE" ]]; then
            echo "::error::Required x86_64 source artifact archive was not downloaded: $X86_64_ARCHIVE"
            exit 1
          fi

          python3 .github/scripts/create_apple_universal_static_artifact.py \
            --target "${{ matrix.target }}" \
            --aarch64-archive "$AARCH64_ARCHIVE" \
            --x86_64-archive "$X86_64_ARCHIVE" \
            --output-archive "${{ steps.artifact-names.outputs.universal }}.zip"

      - name: Upload universal artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-names.outputs.universal }}
          path: '${{ steps.artifact-names.outputs.universal }}.zip'
          if-no-files-found: error

  package-apple-xcframework:
    name: Package ort-${{ inputs.onnxruntime-ref }}-${{ matrix.target }}-${{ matrix.buildtype }}
    if: needs.validate-targets.outputs['xcframework-targets'] != ''
    needs: [validate-targets, build, package-universal-apple]
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.validate-targets.outputs['xcframework-matrix']) }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate reduced operator input combination
        if: >
          inputs.enable-reduced-operator-type-support &&
          inputs.required-operators-config-base64 == ''
        shell: bash
        run: |
          echo "enable-reduced-operator-type-support requires required-operators-config-base64." >&2
          exit 1

      - name: Decode and validate required operators config for artifact names
        id: required-ops
        if: inputs.required-operators-config-base64 != ''
        env:
          REQUIRED_OPERATORS_CONFIG_BASE64: ${{ inputs.required-operators-config-base64 }}
        shell: bash
        run: |
          CONFIG_PATH="$RUNNER_TEMP/required_operators.config"
          VALIDATION_ARGS=()
          if [[ "${{ inputs.enable-reduced-operator-type-support }}" == "true" ]]; then
            VALIDATION_ARGS+=(--enable-reduced-operator-type-support)
          fi

          python3 .github/scripts/validate_required_operators_config.py \
            --base64-env REQUIRED_OPERATORS_CONFIG_BASE64 \
            --output "$CONFIG_PATH" \
            --github-output "$GITHUB_OUTPUT" \
            "${VALIDATION_ARGS[@]}"

      - name: Lowercase buildtype
        id: lower-buildtype
        shell: bash
        run: |
          LOWER=$(echo "${{ matrix.buildtype }}" | tr '[:upper:]' '[:lower:]')
          echo "string=${LOWER}" >> "$GITHUB_OUTPUT"

      - name: Artifact names
        id: artifact-names
        shell: bash
        env:
          REQUIRED_OPERATORS_CONFIG_SHA_SHORT: ${{ steps.required-ops.outputs.sha256_short }}
        run: |
          artifact_name() {
            local target="$1"
            if [[ -n "${REQUIRED_OPERATORS_CONFIG_SHA_SHORT:-}" ]]; then
              echo "ort-${{ inputs.onnxruntime-ref }}-${target}-ops-${REQUIRED_OPERATORS_CONFIG_SHA_SHORT}-${{ steps.lower-buildtype.outputs.string }}"
            else
              echo "ort-${{ inputs.onnxruntime-ref }}-${target}-${{ steps.lower-buildtype.outputs.string }}"
            fi
          }

          IOS_DEVICE_ARTIFACT=$(artifact_name "${{ matrix.ios_device_target }}")
          IOS_SIMULATOR_ARTIFACT=$(artifact_name "${{ matrix.ios_simulator_universal_target }}")
          MACOS_ARTIFACT=$(artifact_name "${{ matrix.macos_universal_target }}")
          XCFRAMEWORK_ARTIFACT=$(artifact_name "${{ matrix.target }}")

          echo "ios_device=${IOS_DEVICE_ARTIFACT}" >> "$GITHUB_OUTPUT"
          echo "ios_simulator=${IOS_SIMULATOR_ARTIFACT}" >> "$GITHUB_OUTPUT"
          echo "macos=${MACOS_ARTIFACT}" >> "$GITHUB_OUTPUT"
          echo "xcframework=${XCFRAMEWORK_ARTIFACT}" >> "$GITHUB_OUTPUT"
          echo "XCFramework source artifacts: ${IOS_DEVICE_ARTIFACT}, ${IOS_SIMULATOR_ARTIFACT}, ${MACOS_ARTIFACT}"
          echo "XCFramework output artifact: ${XCFRAMEWORK_ARTIFACT}"

      - name: Download iOS device source artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ steps.artifact-names.outputs.ios_device }}
          path: xcframework-sources/ios-device

      - name: Download iOS simulator universal source artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ steps.artifact-names.outputs.ios_simulator }}
          path: xcframework-sources/ios-simulator

      - name: Download macOS universal source artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ steps.artifact-names.outputs.macos }}
          path: xcframework-sources/macos

      - name: Create Apple XCFramework artifact
        shell: bash
        run: |
          IOS_DEVICE_ARCHIVE="xcframework-sources/ios-device/${{ steps.artifact-names.outputs.ios_device }}.zip"
          IOS_SIMULATOR_ARCHIVE="xcframework-sources/ios-simulator/${{ steps.artifact-names.outputs.ios_simulator }}.zip"
          MACOS_ARCHIVE="xcframework-sources/macos/${{ steps.artifact-names.outputs.macos }}.zip"

          if [[ ! -f "$IOS_DEVICE_ARCHIVE" ]]; then
            echo "::error::Required iOS device source artifact archive was not downloaded: $IOS_DEVICE_ARCHIVE"
            exit 1
          fi
          if [[ ! -f "$IOS_SIMULATOR_ARCHIVE" ]]; then
            echo "::error::Required iOS simulator universal source artifact archive was not downloaded: $IOS_SIMULATOR_ARCHIVE"
            exit 1
          fi
          if [[ ! -f "$MACOS_ARCHIVE" ]]; then
            echo "::error::Required macOS universal source artifact archive was not downloaded: $MACOS_ARCHIVE"
            exit 1
          fi

          xcodebuild -version
          xcrun --sdk macosx --show-sdk-path
          xcrun --sdk iphonesimulator --show-sdk-path

          python3 .github/scripts/create_apple_xcframework_artifact.py \
            --ios-device-archive "$IOS_DEVICE_ARCHIVE" \
            --ios-simulator-archive "$IOS_SIMULATOR_ARCHIVE" \
            --macos-archive "$MACOS_ARCHIVE" \
            --output-archive "${{ steps.artifact-names.outputs.xcframework }}.zip"

      - name: Upload Apple XCFramework artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-names.outputs.xcframework }}
          path: '${{ steps.artifact-names.outputs.xcframework }}.zip'
          if-no-files-found: error
