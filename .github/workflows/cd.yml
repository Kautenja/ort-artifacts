name: CD
on:
  workflow_dispatch:
    inputs:
      onnxruntime-ref:
        type: string
        description: "ONNX Runtime repository reference, e.g., 'v1.22.2' or 'main'"
        default: "v1.22.2"
      target-all:
        type: boolean
        description: "All active targets"
        required: false
        default: true
      linux-aarch64-static:
        type: boolean
        description: "Linux aarch64 static"
        required: false
        default: false
      linux-x86_64-static:
        type: boolean
        description: "Linux x86_64 static"
        required: false
        default: false
      macos-aarch64-static:
        type: boolean
        description: "macOS aarch64 static"
        required: false
        default: false
      macos-x86_64-static:
        type: boolean
        description: "macOS x86_64 static"
        required: false
        default: false
      windows-md-x86_64-static:
        type: boolean
        description: "Windows x86_64 static, dynamic CRT"
        required: false
        default: false
      ios-aarch64-static:
        type: boolean
        description: "iOS device aarch64 static"
        required: false
        default: false
      ios-simulator-aarch64-static:
        type: boolean
        description: "iOS simulator aarch64 static"
        required: false
        default: false
      ios-simulator-x86_64-static:
        type: boolean
        description: "iOS simulator x86_64 static"
        required: false
        default: false
      android-arm64-v8a-static:
        type: boolean
        description: "Android arm64-v8a static"
        required: false
        default: false
      android-armeabi-v7a-static:
        type: boolean
        description: "Android armeabi-v7a static"
        required: false
        default: false
      android-x86_64-static:
        type: boolean
        description: "Android x86_64 static"
        required: false
        default: false
      android-x86-static:
        type: boolean
        description: "Android x86 static"
        required: false
        default: false
      buildtype:
        type: choice
        required: true
        default: 'Release'
        options:
          - 'Both'
          - 'Release'
          - 'Debug'
      required-operators-config-base64:
        type: string
        description: "Optional base64-encoded contents of a *.required_operators.config or *.required_operators_and_types.config file."
        required: false
        default: ""
      enable-reduced-operator-type-support:
        type: boolean
        description: "Enable ONNX Runtime reduced operator type support. Requires required-operators-config-base64."
        required: false
        default: false
      enable-xnnpack:
        type: boolean
        description: "Enable XNNPACK for compatible targets only."
        required: false
        default: true
      enable-openvino:
        type: boolean
        description: "Enable OpenVINO for compatible targets only."
        required: false
        default: true
      enable-directml:
        type: boolean
        description: "Enable DirectML for compatible targets only."
        required: false
        default: true
      enable-coreml:
        type: boolean
        description: "Enable CoreML for compatible targets only."
        required: false
        default: true
      enable-nnapi:
        type: boolean
        description: "Enable NNAPI for compatible targets only."
        required: false
        default: true
      publish:
        type: boolean
        description: "Publish as draft release on GitHub."
        required: false
        default: false

jobs:
  select-targets:
    name: Select build targets
    runs-on: ubuntu-22.04
    outputs:
      targets: ${{ steps.targets.outputs.targets }}
    steps:
      - name: Build exact target list
        id: targets
        shell: bash
        env:
          TARGET_ALL: ${{ inputs['target-all'] }}
          LINUX_AARCH64_STATIC: ${{ inputs['linux-aarch64-static'] }}
          LINUX_X86_64_STATIC: ${{ inputs['linux-x86_64-static'] }}
          MACOS_AARCH64_STATIC: ${{ inputs['macos-aarch64-static'] }}
          MACOS_X86_64_STATIC: ${{ inputs['macos-x86_64-static'] }}
          WINDOWS_MD_X86_64_STATIC: ${{ inputs['windows-md-x86_64-static'] }}
          IOS_AARCH64_STATIC: ${{ inputs['ios-aarch64-static'] }}
          IOS_SIMULATOR_AARCH64_STATIC: ${{ inputs['ios-simulator-aarch64-static'] }}
          IOS_SIMULATOR_X86_64_STATIC: ${{ inputs['ios-simulator-x86_64-static'] }}
          ANDROID_ARM64_V8A_STATIC: ${{ inputs['android-arm64-v8a-static'] }}
          ANDROID_ARMEABI_V7A_STATIC: ${{ inputs['android-armeabi-v7a-static'] }}
          ANDROID_X86_64_STATIC: ${{ inputs['android-x86_64-static'] }}
          ANDROID_X86_STATIC: ${{ inputs['android-x86-static'] }}
        run: |
          if [[ "$TARGET_ALL" == "true" ]]; then
            echo "targets=all" >> "$GITHUB_OUTPUT"
            echo "Selected targets: all active targets"
            exit 0
          fi

          targets=()
          [[ "$LINUX_AARCH64_STATIC" == "true" ]] && targets+=(linux-aarch64-static)
          [[ "$LINUX_X86_64_STATIC" == "true" ]] && targets+=(linux-x86_64-static)
          [[ "$MACOS_AARCH64_STATIC" == "true" ]] && targets+=(macos-aarch64-static)
          [[ "$MACOS_X86_64_STATIC" == "true" ]] && targets+=(macos-x86_64-static)
          [[ "$WINDOWS_MD_X86_64_STATIC" == "true" ]] && targets+=(windows-md-x86_64-static)
          [[ "$IOS_AARCH64_STATIC" == "true" ]] && targets+=(ios-aarch64-static)
          [[ "$IOS_SIMULATOR_AARCH64_STATIC" == "true" ]] && targets+=(ios-simulator-aarch64-static)
          [[ "$IOS_SIMULATOR_X86_64_STATIC" == "true" ]] && targets+=(ios-simulator-x86_64-static)
          [[ "$ANDROID_ARM64_V8A_STATIC" == "true" ]] && targets+=(android-arm64-v8a-static)
          [[ "$ANDROID_ARMEABI_V7A_STATIC" == "true" ]] && targets+=(android-armeabi-v7a-static)
          [[ "$ANDROID_X86_64_STATIC" == "true" ]] && targets+=(android-x86_64-static)
          [[ "$ANDROID_X86_STATIC" == "true" ]] && targets+=(android-x86-static)

          target_list=$(IFS=,; echo "${targets[*]}")
          echo "targets=${target_list}" >> "$GITHUB_OUTPUT"
          if [[ -n "$target_list" ]]; then
            echo "Selected targets: ${target_list}"
          else
            echo "::notice::No target checkbox was selected; the build workflow will fail before platform setup."
          fi

  build-debug:
    if: inputs.buildtype == 'Both' || inputs.buildtype == 'Debug'
    needs: select-targets
    uses: ./.github/workflows/_build.yml
    with:
      onnxruntime-ref: ${{ inputs.onnxruntime-ref }}
      buildtype: Debug
      targets: ${{ needs.select-targets.outputs.targets }}
      required-operators-config-base64: ${{ inputs.required-operators-config-base64 }}
      enable-reduced-operator-type-support: ${{ inputs.enable-reduced-operator-type-support }}
      enable-xnnpack: ${{ inputs.enable-xnnpack }}
      enable-openvino: ${{ inputs.enable-openvino }}
      enable-directml: ${{ inputs.enable-directml }}
      enable-coreml: ${{ inputs.enable-coreml }}
      enable-nnapi: ${{ inputs.enable-nnapi }}

  build-release:
    if: inputs.buildtype == 'Both' || inputs.buildtype == 'Release'
    needs: select-targets
    uses: ./.github/workflows/_build.yml
    with:
      onnxruntime-ref: ${{ inputs.onnxruntime-ref }}
      buildtype: Release
      targets: ${{ needs.select-targets.outputs.targets }}
      required-operators-config-base64: ${{ inputs.required-operators-config-base64 }}
      enable-reduced-operator-type-support: ${{ inputs.enable-reduced-operator-type-support }}
      enable-xnnpack: ${{ inputs.enable-xnnpack }}
      enable-openvino: ${{ inputs.enable-openvino }}
      enable-directml: ${{ inputs.enable-directml }}
      enable-coreml: ${{ inputs.enable-coreml }}
      enable-nnapi: ${{ inputs.enable-nnapi }}

  publish:
    if: inputs.publish && always() && !cancelled() && !contains(needs.*.result, 'failure')
    needs: [select-targets, build-debug, build-release]
    uses: ./.github/workflows/_publish.yml
    with:
      onnxruntime-ref: ${{ inputs.onnxruntime-ref }}
